# Environment for cjm-transcription-plugin-voxtral-vllm
# Provides Voxtral transcription via vLLM server with CUDA support
name: cjm-transcription-plugin-voxtral-vllm
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.12

  # Pip dependencies
  - pip
  - pip:
    # PyTorch with CUDA (adjust for target cuda version as needed)
    - torch
    - torchaudio

    # Core plugin infrastructure
    - cjm-plugin-system
    - cjm-transcription-plugin-system

    # vLLM and Mistral dependencies
    # Pinned (2026-05-30): vllm 0.22.0 pulls flashinfer 0.6.11.post2 + CUDA-13 CUB headers
    # whose JIT-compiled sampling kernel fails against the system nvcc 12.0
    # (cub BlockAdjacentDifference has no member "FlagHeads"). 0.21.0 anchors a
    # self-consistent pre-CUDA-13 torch/flashinfer/transformers set. SG-12 reproducibility.
    - vllm==0.21.0
    - mistral-common[audio]
    - transformers
    - accelerate

    # OpenAI client for vLLM API
    - openai

    # Audio processing
    - soundfile
    - numpy
    - librosa

    # Utilities
    - fastcore
    - nest-asyncio
    - uv

    # Worker dependencies (FastAPI, uvicorn, psutil, httpx)
    - fastapi
    - uvicorn
    - psutil
    - httpx
